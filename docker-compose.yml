version: '3.8'

# ── Sistema de Gestión de Invernadero Inteligente ────────────────
# Levanta todos los servicios del sistema en entorno local.
# Uso: docker-compose up
# ────────────────────────────────────────────────────────────────

services:

  # ── BASE DE DATOS RELACIONAL (PostgreSQL) ─────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: invernadero-postgres
    environment:
      POSTGRES_DB: invernadero_db
      POSTGRES_USER: invernadero_user
      POSTGRES_PASSWORD: invernadero_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - invernadero-net

  # ── BASE DE DATOS NoSQL (MongoDB) ─────────────────────────────
  mongodb:
    image: mongo:6-jammy
    container_name: invernadero-mongodb
    environment:
      MONGO_INITDB_DATABASE: invernadero_iot
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - invernadero-net

  # ── BROKER MQTT (Mosquitto) ───────────────────────────────────
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: invernadero-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - invernadero-net

  # ── BACKEND (Spring Boot) — Equipo IS ─────────────────────────
  backend:
    build: ./backend
    container_name: invernadero-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/invernadero_db
      SPRING_DATASOURCE_USERNAME: invernadero_user
      SPRING_DATASOURCE_PASSWORD: invernadero_pass
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/invernadero_iot
      MQTT_BROKER_URL: tcp://mqtt-broker:1883
    depends_on:
      - postgres
      - mongodb
      - mqtt-broker
    networks:
      - invernadero-net

  # ── FRONTEND (React) — Equipo IS ──────────────────────────────
  frontend:
    build: ./frontend
    container_name: invernadero-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - invernadero-net

  # ── GATEWAY IoT (Python + Flask + MQTT) — Equipo IoT ──────────
  iot-gateway:
    build: ./iot/gateway
    container_name: invernadero-iot-gateway
    ports:
      - "5001:5001"
    environment:
      MQTT_BROKER_URL: mqtt-broker
      MQTT_PORT: 1883
      BACKEND_URL: http://backend:8080/api
    depends_on:
      - mqtt-broker
      - backend
    networks:
      - invernadero-net

  # ── SERVICIO IA (Python + Flask) — Equipo IA ──────────────────
  ai-service:
    build: ./ai/services
    container_name: invernadero-ai-service
    ports:
      - "5002:5002"
    environment:
      BACKEND_URL: http://backend:8080/api
    networks:
      - invernadero-net

# ── VOLÚMENES ────────────────────────────────────────────────────
volumes:
  postgres_data:
  mongo_data:
  mosquitto_data:
  mosquitto_logs:

# ── RED ──────────────────────────────────────────────────────────
networks:
  invernadero-net:
    driver: bridge
