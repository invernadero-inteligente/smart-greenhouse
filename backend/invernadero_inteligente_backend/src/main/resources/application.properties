# ============================================================================
# IMPORTAR VARIABLES DE ENTORNO DESDE .env
# ============================================================================
spring.config.import=optional:file:.env[.properties]

# ============================================================================
# APPLICATION - Información de la aplicación
# ============================================================================
spring.application.name=${APP_NAME:Invernadero Inteligente Backend}
app.version=${APP_VERSION:1.0.0}
app.description=${APP_DESCRIPTION:Sistema de Gestión de Invernadero Inteligente}
app.environment=${APP_ENVIRONMENT:development}

# ============================================================================
# SERVER - Configuración del servidor
# ============================================================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/}
server.servlet.session.timeout=${SERVER_SERVLET_SESSION_TIMEOUT:3600}
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ============================================================================
# DATABASE - PostgreSQL
# ============================================================================
spring.datasource.url=jdbc:postgresql://postgres:5432/invernadero_db
spring.datasource.username=invernadero_user
spring.datasource.password=invernadero_pass
spring.datasource.driver-class-name=org.postgresql.Driver
# ============================================================================
# FLYWAY
# ============================================================================
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
# ============================================================================
# JPA / HIBERNATE - Configuración ORM
# ============================================================================
spring.jpa.database-platform=${JPA_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.use_sql_comments=${JPA_PROPERTIES_HIBERNATE_USE_SQL_COMMENTS:true}

# ============================================================================
# LOGGING - Configuración de logs
# ============================================================================
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.invernadero=${LOGGING_LEVEL_COM_INVERNADERO:DEBUG}
logging.level.org.springframework.web=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}
logging.pattern.console=${LOGGING_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss} - %msg%n}
logging.pattern.file=${LOGGING_PATTERN_FILE:%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n}

# ============================================================================
# JWT - Configuración de autenticación
# ============================================================================
app.jwt.secret=${JWT_SECRET:tu_clave_secreta_super_larga_y_segura_de_minimo_32_caracteres}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ============================================================================
# CORS - Configuración de orígenes
# ============================================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.max-age=${CORS_MAX_AGE:3600}

# ============================================================================
# MAIL - Configuración de correo
# ============================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:tu_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu_contrasena_aplicacion}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}

# ============================================================================
# IoT - MQTT Configuration
# ============================================================================
app.iot.mqtt.broker-url=${IOT_MQTT_BROKER_URL:mqtt://localhost:1883}
app.iot.mqtt.client-id=${IOT_MQTT_CLIENT_ID:invernadero-backend}
app.iot.mqtt.username=${IOT_MQTT_USERNAME:mqtt_user}
app.iot.mqtt.password=${IOT_MQTT_PASSWORD:mqtt_pass}
app.iot.mqtt.topic-prefix=${IOT_MQTT_TOPIC_PREFIX:invernadero/}

# ============================================================================
# ACTUALIZACIONES Y MANTENIMIENTO
# ============================================================================
app.update.check-enabled=${UPDATE_CHECK_ENABLED:true}
app.maintenance.mode=${MAINTENANCE_MODE:false}
