# Configuración de la Aplicación - Invernadero Inteligente

# ============================================
# SERVIDOR
# ============================================
server.port=8080
server.servlet.context-path=/
server.servlet.session.timeout=30m

# ============================================
# APLICACIÓN
# ============================================
spring.application.name=invernadero-inteligente-backend
app.name=Invernadero Inteligente
app.version=1.0.0
spring.profiles.active=dev

# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/invernadero_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# MONGODB - SERIES DE TIEMPO Y EVENTOS
# ============================================
spring.data.mongodb.uri=mongodb://localhost:27017/invernadero_sensores
spring.data.mongodb.auto-index-creation=true

# ============================================
# SECURITY - JWT
# ============================================
jwt.secret=invernadero-inteligente-backend-secret-key-2026-ciencias-basicas
jwt.expiration=18000000
jwt.refresh-token-expiration=604800000
jwt.header=Authorization
jwt.prefix=Bearer 

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.invernadero=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/invernadero.log
logging.file.max-size=10MB
logging.file.max-history=10

# ============================================
# JACKSON - JSON SERIALIZATION
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ============================================
# CORS
# ============================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ============================================
# VALIDACIÓN
# ============================================
spring.validation.enabled=true

# ============================================
# PAGINACIÓN
# ============================================
pagination.default-page=0
pagination.default-size=20
pagination.max-size=100

# ============================================
# CACHE
# ============================================
spring.cache.type=simple
spring.cache.cache-names=invernaderos,sensores,usuarios

# ============================================
# ACTUATOR - MONITOREO
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

